<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Auto-login bridge</title>
<style>body{font-family:sans-serif;padding:40px;background:#0F1A2E;color:#fff;}h1{color:#0D9488;}pre{background:#1c2a45;padding:14px;border-radius:6px;font-size:12px;}</style>
</head><body>
<h1>GradiumOS auto-login bridge</h1>
<p>Pick a portal — I will POST credentials, store the JWT in this origin's localStorage, then redirect you in.</p>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;">
  <button onclick="go('http://localhost:5277','arjun@srm.edu')" style="padding:14px 18px;background:#0D9488;color:#fff;border:0;border-radius:6px;cursor:pointer;font-size:14px;">Talent → Arjun (LEARNER)</button>
  <button onclick="go('http://localhost:5275','sarita@freshworks.com')" style="padding:14px 18px;background:#7C3AED;color:#fff;border:0;border-radius:6px;cursor:pointer;font-size:14px;">Workforce → Sarita (TA_LEAD)</button>
  <button onclick="go('http://localhost:5273','krishnamurthy@srm.edu')" style="padding:14px 18px;background:#2563EB;color:#fff;border:0;border-radius:6px;cursor:pointer;font-size:14px;">Campus → Krishnamurthy (DEAN)</button>
</div>
<pre id="log">Ready.</pre>
<script>
async function go(portalOrigin, email) {
  const log = document.getElementById('log');
  log.textContent = 'Logging in as ' + email + '…';
  try {
    const r = await fetch('http://localhost:4002/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: 'DemoPass1!' }),
    });
    const env = await r.json();
    if (!env.data) throw new Error(env.error?.message ?? 'login failed');
    log.textContent = 'Got tokens. Setting localStorage on ' + portalOrigin + '…';
    // Use a hidden iframe + postMessage to set localStorage on the target origin
    const bridge = portalOrigin + '/?bridge=' + encodeURIComponent(JSON.stringify({
      accessToken: env.data.accessToken,
      refreshToken: env.data.refreshToken,
      user: env.data.user,
    }));
    location.href = bridge;
  } catch (e) {
    log.textContent = 'Error: ' + e.message;
  }
}
</script></body></html>
