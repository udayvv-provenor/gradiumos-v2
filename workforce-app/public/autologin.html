<!DOCTYPE html><html><head><meta charset="utf-8"><title>Login bridge</title></head><body>
<p style="font-family:sans-serif;padding:20px;">Logging in as <span id="who">…</span> and writing localStorage…</p>
<script>
const params = new URLSearchParams(location.search);
const email = params.get('email') || 'arjun@srm.edu';
const next  = params.get('next')  || '/dashboard';
// Detect portal by origin so we can write to the right user key
const port = location.port;
const portalKey = port === '5277' ? 'talent_user' : port === '5275' ? 'workforce_user' : port === '5273' ? 'campus_user' : 'user';
document.getElementById('who').textContent = email;
// Clear any stale user from prior session before re-writing
['talent_user','workforce_user','campus_user','user'].forEach(k => localStorage.removeItem(k));
fetch('http://localhost:4002/api/auth/login', {
  method:'POST', headers:{'Content-Type':'application/json'},
  body: JSON.stringify({ email, password: 'DemoPass1!' }),
}).then(r => r.json()).then(env => {
  if (!env.data) throw new Error(env.error?.message ?? 'login failed');
  localStorage.setItem('accessToken',  env.data.accessToken);
  localStorage.setItem('refreshToken', env.data.refreshToken);
  localStorage.setItem(portalKey, JSON.stringify(env.data.user));
  location.replace(next);
}).catch(e => { document.body.innerHTML = '<pre>' + e.message + '</pre>'; });
</script></body></html>
