version: '3.8'
services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gradium_test
      POSTGRES_PASSWORD: gradium_test
      POSTGRES_DB: gradium_v3_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gradium_test']
      interval: 5s
      timeout: 5s
      retries: 5

  backend-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://gradium_test:gradium_test@postgres-test:5432/gradium_v3_test
      JWT_ACCESS_SECRET: test-access-secret-min-32-chars-long
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-long
      PORT: 4002
    depends_on:
      postgres-test:
        condition: service_healthy
    ports:
      - '4002:4002'
